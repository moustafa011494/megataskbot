<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaTask Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ستايل سريع عشان يطابق تصميمك */
        body { background-color: #0d0d0d; color: white; font-family: sans-serif; text-align: center; }
        .balance-card { 
            background: linear-gradient(45deg, #1a1a1a, #2c004d); 
            padding: 30px; border-radius: 20px; border: 1px solid #bc13fe; margin: 20px;
        }
        .points { font-size: 40px; color: #00f2ff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="balance-card">
        <p>رصيدك الحالي</p>
        <div class="points" id="user-points">0000</div>
        <p id="user-name">جاري التحميل...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // بيانات سوبابيز بتاعتك
        const SUPABASE_URL = "https://smukfrwnguvmxvfwqwrv.supabase.co";
        const SUPABASE_KEY = "حط_هنا_الـ_Anon_Key_بتاعك_اللي_بعتهولي_قبل_كده";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const user = tg.initDataUnsafe.user;

        async function loadData() {
            if (user) {
                // بنجيب النقط من جدول users عن طريق الـ ID
                let { data, error } = await supabase
                    .from('users')
                    .select('points')
                    .eq('id', user.id)
                    .single();

                if (data) {
                    document.getElementById('user-points').innerText = data.points;
                    document.getElementById('user-name').innerText = user.first_name;
                }
            }
        }
        loadData();
    </script>
</body>
</html>
