<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaTask - الرئيسية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --neon: #00f2ff; --bg: #0d0d0d; --card: #161616; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        .header { margin-bottom: 30px; }
        h1 { color: var(--neon); text-shadow: 0 0 10px var(--neon); font-size: 28px; }
        
        .balance-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; margin-bottom: 25px; }
        .balance-title { font-size: 14px; color: #888; margin-bottom: 5px; }
        .balance-amount { font-size: 32px; font-weight: bold; color: var(--neon); }

        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        
        .btn { background: var(--card); color: white; border: 1px solid #333; padding: 20px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
        .btn:active { transform: scale(0.95); background: #222; }
        .btn-primary { background: var(--neon); color: black; border: none; }
        .btn-invite { background: linear-gradient(45deg, #00f2ff, #0072ff); color: white; border: none; }

        .footer { margin-top: 40px; font-size: 12px; color: #444; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛡️ MegaTask Bot</h1>
    </div>

    <div class="balance-card">
        <div class="balance-title">رصيدك الحالي</div>
        <div class="balance-amount" id="user-points">0</div>
    </div>

    <div class="menu-grid">
        <div class="btn btn-primary" onclick="openTasks()">📝 تنفيذ المهام</div>
        
        <div class="btn" onclick="openWithdraw()">💸 سحب الأرباح</div>
        
        <div class="btn btn-invite" onclick="openInvite()">👥 ادعُ أصدقاءك (+100)</div>
    </div>

    <div class="footer">MegaTask System v2.0 - 2026</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // بيانات سوبابيز (بتاعتك اللي شغالة)
        const S_URL = "https://smukfrwnguvmxvfwqwrv.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM";
        const client = supabase.createClient(S_URL, S_KEY);

        let userId = "";

        async function init() {
            const params = new URLSearchParams(window.location.search);
            userId = String(params.get('id') || tg.initDataUnsafe.user?.id || "");

            if (!userId || userId === "null") {
                document.getElementById('user-points').innerText = "⚠️ افتح من التليجرام";
                return;
            }

            try {
                // 1. محاولة جلب اليوزر من القاعدة
                let { data: user, error } = await client.from('users').select('*').eq('telegram_id', userId).maybeSingle();

                // 2. لو اليوزر مش موجود (جديد)
                if (!user) {
                    const referrerId = tg.initDataUnsafe.start_param; // الـ ID بتاع اللي عمل الدعوة
                    
                    let newUser = { 
                        telegram_id: userId, 
                        name: tg.initDataUnsafe.user?.first_name || "مستخدم", 
                        points: 0 
                    };

                    // لو جاي من لينك دعوة
                    if (referrerId && referrerId !== userId) {
                        newUser.referred_by = String(referrerId);
                        await giveReward(referrerId);
                    }

                    const { data: created } = await client.from('users').insert([newUser]).select().single();
                    user = created;
                }

                // 3. عرض النقط
                if (user) {
                    document.getElementById('user-points').innerText = user.points.toLocaleString();
                }

            } catch (err) {
                console.error("Error:", err);
            }
        }

        async function giveReward(inviterId) {
            try {
                const { data } = await client.from('users').select('points').eq('telegram_id', String(inviterId)).maybeSingle();
                if (data) {
                    await client.from('users').update({ points: data.points + 100 }).eq('telegram_id', String(inviterId));
                }
            } catch (e) { console.error("Referral Reward Error"); }
        }

        // وظائف التنقل (الزراير)
        function openTasks() { window.location.href = `tasks.html?id=${userId}`; }
        function openWithdraw() { window.location.href = `withdraw.html?id=${userId}`; }
        function openInvite() { window.location.href = `invite.html?id=${userId}`; }

        // تشغيل السيستم
        init();
    </script>
</body>
</html>
