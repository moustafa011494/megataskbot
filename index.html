<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaTaskBot Pro + Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --success: #10b981; --admin: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; text-align: center; }
        .card { background: var(--card); border-radius: 24px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .balance-amount { font-size: 40px; font-weight: 800; color: var(--primary); }
        .btn { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* استايل لوحة التحكم */
        #adminPanel { display: none; border: 2px solid var(--admin); margin-top: 30px; background: #1a1a2e; }
        .admin-badge { background: var(--admin); color: black; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; }
        .admin-input { background: #0f172a; border: 1px solid var(--admin); color: white; padding: 10px; width: 80%; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div style="color: #94a3b8;">رصيدك</div>
        <div class="balance-amount" id="points">0</div>
        <button class="btn" id="startBtn" onclick="startTask()">🚀 مهمة جديدة</button>
    </div>

    <div class="card" id="adminPanel">
        <div class="admin-badge">لوحة تحكم المدير 👑</div>
        <div class="stat-grid">
            <div class="stat-item">
                <div style="font-size: 12px;">المستخدمين</div>
                <div id="totalUsers" style="color: var(--admin); font-weight: bold;">0</div>
            </div>
            <div class="stat-item">
                <div style="font-size: 12px;">إجمالي النقاط</div>
                <div id="totalPoints" style="color: var(--admin); font-weight: bold;">0</div>
            </div>
        </div>
        <input type="number" id="searchId" class="admin-input" placeholder="ادخل ID المستخدم">
        <button class="btn" style="background: var(--admin);" onclick="getUserData()">بحث وتعديل</button>
    </div>
</div>

<script>
    const webapp = window.Telegram.WebApp;
    const SUPABASE_URL = 'https://smukfrwnguvmxvfwqwrv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const userId = webapp.initDataUnsafe.user.id;
    const ADMIN_ID = 875021647; // 🚨 استبدل هذا الرقم بـ الـ ID بتاعك من التليجرام

    async function initApp() {
        // تحديث واجهة المستخدم
        let { data: user } = await supabaseClient.from('users').select('points').eq('telegram_id', userId).maybeSingle();
        if (user) document.getElementById('points').innerText = user.points.toLocaleString();

        // إظهار لوحة التحكم لو أنت الأدمن
        if (userId === ADMIN_ID) {
            document.getElementById('adminPanel').style.display = 'block';
            loadAdminStats();
        }
    }

    async function loadAdminStats() {
        const { data: allUsers } = await supabaseClient.from('users').select('points');
        if (allUsers) {
            document.getElementById('totalUsers').innerText = allUsers.length;
            const total = allUsers.reduce((sum, u) => sum + (u.points || 0), 0);
            document.getElementById('totalPoints').innerText = total.toLocaleString();
        }
    }

    async function getUserData() {
        const searchId = document.getElementById('searchId').value;
        const { data: user } = await supabaseClient.from('users').select('*').eq('telegram_id', searchId).maybeSingle();
        if (user) {
            const newPoints = prompt(`مستخدم: ${user.username}\nرصيده الحالي: ${user.points}\nادخل الرصيد الجديد:`, user.points);
            if (newPoints !== null) {
                await supabaseClient.from('users').update({ points: parseInt(newPoints) }).eq('telegram_id', searchId);
                alert("تم التعديل بنجاح!");
                loadAdminStats();
            }
        } else { alert("المستخدم غير موجود!"); }
    }

    // دالة startTask القديمة تظل كما هي هنا...
    initApp();
</script>
</body>
</html>
