<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaTask - Hacker Mode</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* ألوان الهكر الجاحدة */
        :root { --hacker-green: #00ff41; --dark-bg: #050505; --card-bg: #0a0a0a; }
        
        body { 
            background: var(--dark-bg); 
            color: var(--hacker-green); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; padding: 20px; text-align: center;
            text-transform: uppercase;
        }

        .header h1 { 
            font-size: 24px; text-shadow: 0 0 15px var(--hacker-green); 
            letter-spacing: 3px; border-bottom: 2px solid var(--hacker-green);
            display: inline-block; padding-bottom: 5px;
        }

        .balance-box { 
            background: var(--card-bg); border: 1px solid var(--hacker-green);
            margin: 30px auto; padding: 25px; border-radius: 5px;
            box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.2);
            max-width: 300px;
        }

        .balance-label { font-size: 12px; opacity: 0.7; }
        .balance-value { 
            font-size: 38px; font-weight: bold; margin-top: 10px;
            text-shadow: 0 0 10px var(--hacker-green);
        }

        .btn-grid { display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 320px; margin: auto; }
        
        .hacker-btn {
            background: transparent; border: 1px solid var(--hacker-green);
            color: var(--hacker-green); padding: 15px; border-radius: 0;
            font-size: 16px; font-family: inherit; font-weight: bold;
            cursor: pointer; position: relative; transition: 0.3s;
            overflow: hidden;
        }

        .hacker-btn:active { background: var(--hacker-green); color: black; box-shadow: 0 0 20px var(--hacker-green); }
        
        /* تأثير الخطوط المتحركة خلف الزرار */
        .hacker-btn::before {
            content: ">>>"; position: absolute; left: 10px; opacity: 0.5;
        }

        .footer { margin-top: 50px; font-size: 10px; opacity: 0.4; }
        
        /* أنيميشن الـ Scanning */
        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 255, 65, 0.1);
            animation: scan 4s linear infinite; z-index: 999; pointer-events: none;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <div class="scan-line"></div>

    <div class="header">
        <h1>[ SYSTEM_ACCESS ]</h1>
    </div>

    <div class="balance-box">
        <div class="balance-label">> CURRENT_ASSETS_LOG:</div>
        <div class="balance-value" id="user-points">00000</div>
    </div>

    <div class="btn-grid">
        <button class="hacker-btn" onclick="openTasks()">EXECUTE_TASKS</button>
        <button class="hacker-btn" onclick="openWithdraw()">WITHDRAW_FUNDS</button>
        <button class="hacker-btn" onclick="openInvite()" style="border-style: dashed;">RECRUIT_AGENTS</button>
    </div>

    <div class="footer">ENCRYPTED CONNECTION ESTABLISHED // MEGA_TASK_V3</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const S_URL = "https://smukfrwnguvmxvfwqwrv.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM";
        const client = supabase.createClient(S_URL, S_KEY);

        let userId = "";

        async function init() {
            const params = new URLSearchParams(window.location.search);
            userId = String(params.get('id') || tg.initDataUnsafe.user?.id || "");
            
            if (!userId) return;

            // جلب البيانات مع نظام الإحالة (الـ 10% اللي ظبطناه)
            let { data: user } = await client.from('users').select('*').eq('telegram_id', userId).maybeSingle();

            if (!user) {
                let ref = tg.initDataUnsafe.start_param;
                if (ref) ref = String(ref).replace('ref_', '');

                let newUser = { telegram_id: userId, name: tg.initDataUnsafe.user?.first_name || "AGENT", points: 0 };
                if (ref && ref !== userId) newUser.referred_by = ref;

                const { data: created } = await client.from('users').insert([newUser]).select().single();
                user = created;
            }

            if (user) {
                document.getElementById('user-points').innerText = user.points.toLocaleString().padStart(5, '0');
            }
        }

        function openTasks() { window.location.href = `tasks.html?id=${userId}`; }
        function openWithdraw() { window.location.href = `withdraw.html?id=${userId}`; }
        function openInvite() { window.location.href = `invite.html?id=${userId}`; }

        init();
    </script>
</body>
</html>
