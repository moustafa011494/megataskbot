<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaTask - الرئيسية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0d0d0d; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .balance-card { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .btn { background: #161616; color: white; border: 1px solid #333; padding: 15px; width: 100%; border-radius: 10px; margin-bottom: 10px; font-weight: bold; cursor: pointer; }
        .btn-main { background: #00f2ff; color: black; border: none; }
        .btn-invite { background: linear-gradient(to right, #00f2ff, #0072ff); color: white; border: none; }
    </style>
</head>
<body>

    <h1>MegaTask Bot</h1>

    <div class="balance-card">
        <p>رصيدك الحالي</p>
        <h2 id="user-points" style="color:#00f2ff; font-size: 30px;">0</h2>
    </div>

    <button class="btn btn-main" onclick="openTasks()">📝 تنفيذ المهام</button>
    <button class="btn" onclick="openWithdraw()">💸 سحب الأرباح</button>
    
    <button class="btn btn-invite" onclick="openInvite()">👥 ادعُ أصدقاءك (+100 نقطة)</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const S_URL = "https://smukfrwnguvmxvfwqwrv.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM";
        const client = supabase.createClient(S_URL, S_KEY);

        let userId = "";

        async function init() {
    try {
        const params = new URLSearchParams(window.location.search);
        // 1. جلب الـ ID الأساسي
        userId = String(params.get('id') || tg.initDataUnsafe.user?.id || "");

        if (!userId || userId === "null") return;

        // 2. محاولة جلب اليوزر
        let { data: user } = await client.from('users').select('*').eq('telegram_id', userId).maybeSingle();

        if (!user) {
            // 🆕 يوزر جديد - هنا اللعبة كلها!
            
            // جلب كود الإحالة من تليجرام (start_param)
            let referrerId = tg.initDataUnsafe.start_param; 

            // تأكد إن الرقم نصي ونضيف (تليجرام ساعات بيبعته كـ string)
            if (referrerId) {
                referrerId = String(referrerId).replace('ref_', ''); // لو اللينك فيه كلمة ref_ يشيلها
            }

            let newUser = { 
                telegram_id: userId, 
                name: tg.initDataUnsafe.user?.first_name || "مستخدم جديد", 
                points: 0 
            };

            // لو فيه داعي ومش هو نفسه اليوزر
            if (referrerId && referrerId !== userId && referrerId !== "undefined") {
                newUser.referred_by = referrerId;
                console.log("Found Referrer:", referrerId);
            }

            const { data: created, error: insErr } = await client.from('users').insert([newUser]).select().single();
            if (insErr) console.error("Insert Error:", insErr);
            user = created;
        }

        if (user) {
            document.getElementById('user-points').innerText = user.points.toLocaleString();
        }

    } catch (err) {
        console.error("Critical Init Error:", err);
    }
}


        function openTasks() { window.location.href = "tasks.html?id=" + userId; }
        function openWithdraw() { window.location.href = "withdraw.html?id=" + userId; }
        function openInvite() { window.location.href = "invite.html?id=" + userId; }

        init();
    </script>
</body>
</html>
