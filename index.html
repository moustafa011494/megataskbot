<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaTaskBot Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --admin: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; text-align: center; }
        .balance-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; margin-bottom: 25px; cursor: pointer; }
        .balance-amount { font-size: 48px; font-weight: 800; color: var(--primary); margin: 10px 0; }
        .btn { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 16px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .input-code { background: #0f172a; border: 2px solid var(--primary); border-radius: 12px; padding: 15px; width: 85%; color: white; text-align: center; font-size: 24px; margin: 20px 0; display: none; outline: none; }
        
        /* استايل لوحة التحكم السرية */
        #adminArea { display: none; margin-top: 20px; border-top: 2px dashed var(--admin); padding-top: 20px; }
        .admin-stat { background: #1a1a2e; padding: 15px; border-radius: 15px; border: 1px solid var(--admin); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="balance-card" onclick="checkAdminClick()">
        <div style="color: #94a3b8; font-size: 14px;">رصيدك الحالي</div>
        <div class="balance-amount" id="points">0</div>
        <div style="font-size: 11px; color: #64748b;">MegaTask v3.1</div>
    </div>

    <div id="userArea">
        <p id="instruction" style="font-size: 14px; color: #94a3b8;">تخطى الرابط للحصول على كود التحقق.</p>
        <input type="number" id="codeInp" class="input-code" placeholder="0000">
        <button class="btn" id="mainBtn" onclick="startTask()">🚀 ابدأ المهمة الآن</button>
    </div>

    <div id="adminArea">
        <div style="color: var(--admin); font-weight: bold; margin-bottom: 15px;">👑 غرفة العمليات (للمدير فقط)</div>
        <div class="admin-stat">
            <div id="statUsers">جاري تحميل الإحصائيات...</div>
        </div>
        <button class="btn" style="background: var(--admin);" onclick="manageUsers()">إدارة مستخدم معين</button>
    </div>
</div>

<script>
    const webapp = window.Telegram.WebApp;
    const SUPABASE_URL = 'https://smukfrwnguvmxvfwqwrv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const userId = webapp.initDataUnsafe.user.id;
    const ADMIN_ID = 875021647; 
    let generatedCode = "";
    let adminClicks = 0;

    async function updateUI() {
        const { data: user } = await supabaseClient.from('users').select('points').eq('telegram_id', userId).maybeSingle();
        if (user) document.getElementById('points').innerText = user.points.toLocaleString();
    }
    
    webapp.ready();
    webapp.expand();
    updateUI();

    function startTask() {
        generatedCode = Math.floor(1000 + Math.random() * 9000).toString();
        const landingPage = `https://megataskbot.vercel.app/code.html?c=${generatedCode}`;
        webapp.openLink(`https://shrinkme.io/st?api=8c0118dbbeaa89891a4957b552419561f3399c24&url=${landingPage}`);

        document.getElementById('instruction').innerText = "أدخل كود التحقق:";
        document.getElementById('codeInp').style.display = 'inline-block';
        document.getElementById('mainBtn').innerText = "✅ تحقق واستلم النقاط";
        document.getElementById('mainBtn').onclick = verify;
    }

    async function verify() {
        if (document.getElementById('codeInp').value === generatedCode) {
            await supabaseClient.rpc('increment_points', { user_id: userId, amount: 50 });
            alert("تم إضافة 50 نقطة!");
            location.reload();
        } else { alert("الكود خطأ!"); }
    }

    // نظام لوحة التحكم السرية
    function checkAdminClick() {
        if (userId === ADMIN_ID) {
            adminClicks++;
            if (adminClicks >= 5) {
                document.getElementById('adminArea').style.display = 'block';
                loadStats();
            }
        }
    }

    async function loadStats() {
        const { data: all } = await supabaseClient.from('users').select('points');
        if (all) {
            const totalPoints = all.reduce((s, u) => s + (u.points || 0), 0);
            document.getElementById('statUsers').innerText = `المستخدمين: ${all.length} | إجمالي النقاط: ${totalPoints.toLocaleString()}`;
        }
    }

    async function manageUsers() {
        const targetId = prompt("ادخل ID المستخدم:");
        if (!targetId) return;
        const { data: u } = await supabaseClient.from('users').select('*').eq('telegram_id', targetId).maybeSingle();
        if (u) {
            const newP = prompt(`مستخدم: ${u.username}\nرصيده: ${u.points}\nادخل الرصيد الجديد:`, u.points);
            if (newP) {
                await supabaseClient.from('users').update({ points: parseInt(newP) }).eq('telegram_id', targetId);
                alert("تم التعديل!");
                loadStats();
            }
        } else { alert("غير موجود!"); }
    }
</script>
</body>
</html>
