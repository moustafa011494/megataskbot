<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaTaskBot - Home</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --referral: #a855f7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; text-align: center; }
        .balance-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 24px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .balance-amount { font-size: 42px; font-weight: 800; color: var(--primary); }
        .task-box { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .btn { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 14px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; }
        .input-code { background: #0f172a; border: 2px solid var(--primary); border-radius: 12px; padding: 12px; width: 80%; color: white; text-align: center; font-size: 20px; margin: 15px 0; display: none; }
    </style>
</head>
<body>
    <div class="balance-card">
        <div style="color: #94a3b8; font-size: 12px;">رصيدك الحالي</div>
        <div class="balance-amount" id="points">0</div>
    </div>

    <div class="task-box">
        <h3>مهمة الكود السري 🔒</h3>
        <p id="instruction" style="font-size: 13px; color: #94a3b8;">تخطى الرابط للحصول على الكود.</p>
        <input type="number" id="codeInp" class="input-code" placeholder="0000">
        <button class="btn" id="startBtn" onclick="startTask()">🚀 ابدأ المهمة</button>
        <button class="btn" id="confirmBtn" style="display:none; background:#10b981;" onclick="verifyCode()">✅ استلام النقاط</button>
    </div>

    <div class="task-box" style="border-color: var(--referral);">
        <h3 style="color: var(--referral);">نظام الإحالة 👥</h3>
        <button class="btn" style="background: var(--referral); color: white;" onclick="copyRef()">🔗 نسخ رابط الإحالة</button>
    </div>

<script>
    const webapp = window.Telegram.WebApp;
    const SUPABASE_URL = 'https://smukfrwnguvmxvfwqwrv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const userId = webapp.initDataUnsafe.user.id;
    let generatedCode = "";

    async function init() {
        webapp.ready(); webapp.expand();
        let { data: user } = await supabaseClient.from('users').select('*').eq('telegram_id', userId).maybeSingle();
        if (!user) {
            const ref = webapp.initDataUnsafe.start_param;
            await supabaseClient.from('users').insert([{ telegram_id: userId, username: webapp.initDataUnsafe.user.username || "User", points: 0 }]);
            if (ref && ref != userId) await supabaseClient.rpc('increment_points', { user_id: parseInt(ref), amount: 100 });
        }
        updateUI();
    }

    async function updateUI() {
        const { data: user } = await supabaseClient.from('users').select('points').eq('telegram_id', userId).maybeSingle();
        if (user) document.getElementById('points').innerText = user.points.toLocaleString();
    }

    function startTask() {
        generatedCode = Math.floor(1000 + Math.random() * 9000).toString();
        const finalUrl = `https://shrinkme.io/st?api=8c0118dbbeaa89891a4957b552419561f3399c24&url=https://megataskbot.vercel.app/code.html?c=${generatedCode}`;
        webapp.openLink(finalUrl);
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('codeInp').style.display = 'inline-block';
        document.getElementById('confirmBtn').style.display = 'block';
    }

    async function verifyCode() {
        if (document.getElementById('codeInp').value === generatedCode) {
            await supabaseClient.rpc('increment_points', { user_id: userId, amount: 50 });
            alert("تم إضافة 50 نقطة!"); location.reload();
        } else { alert("الكود خطأ!"); }
    }

    function copyRef() {
        const refLink = `https://t.me/MegaTask1Bot/app?startapp=${userId}`;
        navigator.clipboard.writeText(refLink); alert("تم النسخ!");
    }
    init();
</script>
</body>
</html>
