<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaTask - الرئيسية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --neon-purple: #bc13fe;
            --neon-blue: #00f2ff;
            --bg-dark: #0d0d0d;
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .balance-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #2c004d 100%);
            padding: 30px 20px;
            border-radius: 25px;
            border: 1px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
            margin-bottom: 25px;
            text-align: center;
            width: calc(100% - 40px);
            max-width: 400px;
        }

        .balance-amount {
            font-size: 50px;
            font-weight: bold;
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue);
            margin: 10px 0;
        }

        .user-welcome { color: #aaa; font-size: 14px; }

        .grid-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        /* تعديل الـ CSS عشان الزرار يبقى Clickable */
        .menu-item {
            background: var(--card-bg);
            border: 1px solid #333;
            padding: 25px 10px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu-item:active {
            transform: scale(0.95);
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px var(--neon-purple);
        }

        .icon { font-size: 30px; }
        .text { font-weight: bold; font-size: 14px; }

        .border-purple { border-color: var(--neon-purple); }
        .border-blue { border-color: var(--neon-blue); }
    </style>
</head>
<body>

    <div class="balance-card">
        <div class="user-welcome">مرحباً، <span id="user-name">...</span> 👋</div>
        <div class="balance-amount" id="user-points">0</div>
        <div style="font-size: 12px; color: var(--neon-purple);">نقطة ذهبية معتمدة</div>
    </div>

    <div class="grid-menu">
        <div onclick="navigate('tasks.html')" class="menu-item border-purple">
            <span class="icon">📋</span>
            <span class="text">بيدج المهام</span>
        </div>
        <div onclick="navigate('deposit.html')" class="menu-item border-blue">
            <span class="icon">💰</span>
            <span class="text">الإيداع</span>
        </div>
        <div onclick="navigate('withdraw.html')" class="menu-item border-blue">
            <span class="icon">💸</span>
            <span class="text">السحب</span>
        </div>
        <div onclick="navigate('smm.html')" class="menu-item border-purple">
            <span class="icon">🚀</span>
            <span class="text">خدمات SMM</span>
        </div>
        <div onclick="navigate('referral.html')" class="menu-item border-purple">
            <span class="icon">👥</span>
            <span class="text">الدعوة</span>
        </div>
        <div onclick="navigate('support.html')" class="menu-item border-blue">
            <span class="icon">🛠</span>
            <span class="text">تواصل معنا</span>
        </div>
    </div>

            <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // بيانات سوبابيز
    const S_URL = "https://smukfrwnguvmxvfwqwrv.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM";
    const client = supabase.createClient(S_URL, S_KEY);

    // متغيرات عالمية عشان الزراير تشوفها
    let userId = "";
    let currentPoints = 0;

    async function init() {
        const params = new URLSearchParams(window.location.search);
        // جلب الـ ID بذكاء
        userId = String(params.get('id') || tg.initDataUnsafe.user?.id || "");

        if (!userId || userId === "null" || userId === "") {
            console.error("No User ID found");
            return;
        }

        try {
            // 1. جلب بيانات اليوزر
            let { data: user, error } = await client.from('users').select('*').eq('telegram_id', userId).maybeSingle();

            if (!user) {
                // يوزر جديد - تسجيله وفحص الدعوة
                let referrerId = tg.initDataUnsafe.start_param; 
                let newUser = { 
                    telegram_id: userId, 
                    name: tg.initDataUnsafe.user?.first_name || "مستخدم", 
                    points: 0 
                };

                if (referrerId && referrerId !== userId) {
                    newUser.referred_by = String(referrerId);
                    await giveReferralReward(referrerId);
                }

                const { data: created } = await client.from('users').insert([newUser]).select().single();
                user = created;
            }

            if (user) {
                currentPoints = user.points;
                const pointsElement = document.getElementById('user-points');
                if(pointsElement) pointsElement.innerText = currentPoints.toLocaleString() + " نقطة";
            }
        } catch (err) {
            console.error("Database Error:", err);
        }
    }

    async function giveReferralReward(inviterId) {
        try {
            const { data } = await client.from('users').select('points').eq('telegram_id', String(inviterId)).maybeSingle();
            if (data) {
                await client.from('users').update({ points: data.points + 100 }).eq('telegram_id', String(inviterId));
            }
        } catch (e) { console.error("Referral Reward Error"); }
    }

    // --- وظائف الزراير (تأكد إن الـ onclick في الـ HTML نفس الأسامي دي) ---

    function openTasks() {
        if(!userId) return alert("انتظر تحميل البيانات...");
        window.location.href = `tasks.html?id=${userId}`;
    }

    function openWithdraw() {
        if(!userId) return alert("انتظر تحميل البيانات...");
        window.location.href = `withdraw.html?id=${userId}`;
    }

    function openInvite() {
        if(!userId) return alert("انتظر تحميل البيانات...");
        window.location.href = `invite.html?id=${userId}`;
    }

    // تشغيل عند التحميل
    window.onload = init;
      </script>
</body>
</html>
