<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaTask - الرئيسية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --neon-purple: #bc13fe;
            --neon-blue: #00f2ff;
            --bg-dark: #0d0d0d;
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* كارت الرصيد الكبير */
        .balance-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #2c004d 100%);
            padding: 30px 20px;
            border-radius: 25px;
            border: 1px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
            margin-bottom: 25px;
            text-align: center;
            width: calc(100% - 40px);
            max-width: 400px;
        }

        .balance-amount {
            font-size: 50px;
            font-weight: bold;
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue);
            margin: 10px 0;
        }

        .user-welcome { color: #aaa; font-size: 14px; }

        /* شبكة الأزرار الـ 6 */
        .grid-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .menu-item {
            background: var(--card-bg);
            border: 1px solid #333;
            padding: 25px 10px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none; /* عشان يشيل الخط تحت اللينك */
            color: white;
            transition: 0.3s;
        }

        .menu-item:active {
            transform: scale(0.95);
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px var(--neon-purple);
        }

        .icon { font-size: 30px; }
        .text { font-weight: bold; font-size: 14px; }

        /* ألوان الحدود للتمييز */
        .border-purple { border-color: var(--neon-purple); }
        .border-blue { border-color: var(--neon-blue); }
    </style>
</head>
<body>

    <div class="balance-card">
        <div class="user-welcome">مرحباً، <span id="user-name">...</span> 👋</div>
        <div class="balance-amount" id="user-points">0</div>
        <div style="font-size: 12px; color: var(--neon-purple);">نقطة ذهبية معتمدة</div>
    </div>

    <div class="grid-menu">
        <a href="tasks.html" class="menu-item border-purple">
            <span class="icon">📋</span>
            <span class="text">بيدج المهام</span>
        </a>
        <a href="deposit.html" class="menu-item border-blue">
            <span class="icon">💰</span>
            <span class="text">الإيداع</span>
        </a>
        <a href="withdraw.html" class="menu-item border-blue">
            <span class="icon">💸</span>
            <span class="text">السحب</span>
        </a>
        <a href="smm.html" class="menu-item border-purple">
            <span class="icon">🚀</span>
            <span class="text">خدمات SMM</span>
        </a>
        <a href="referral.html" class="menu-item border-purple">
            <span class="icon">👥</span>
            <span class="text">الدعوة</span>
        </a>
        <a href="support.html" class="menu-item border-blue">
            <span class="icon">🛠</span>
            <span class="text">تواصل معنا</span>
        </a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // بيانات سوبابيز (المحفوظة عندي)
        const SUPABASE_URL = "https://smukfrwnguvmxvfwqwrv.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const user = tg.initDataUnsafe.user;

        async function loadData() {
            if (user) {
                // عرض اسم اليوزر
                document.getElementById('user-name').innerText = user.first_name;

                // جلب النقاط من جدول users
                let { data, error } = await supabaseClient
                    .from('users')
                    .select('points')
                    .eq('id', user.id)
                    .single();

                if (data) {
                    document.getElementById('user-points').innerText = data.points.toLocaleString();
                } else if (error) {
                    console.error("Error fetching points:", error);
                }
            } else {
                document.getElementById('user-name').innerText = "زائر";
            }
        }

        // تشغيل الجلب عند الفتح
        loadData();
    </script>
</body>
</html>
