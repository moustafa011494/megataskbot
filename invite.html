<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة الأصدقاء</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0d0d0d; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #161616; padding: 20px; border-radius: 15px; border: 1px dashed #333; margin-top: 20px; }
        .link { color: #00f2ff; word-break: break-all; margin: 15px 0; font-size: 14px; }
        .btn { background: #00f2ff; color: black; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>👥 نظام الإحالة</h2>
    <p>خد 100 نقطة عن كل واحد يسجل من لينكك!</p>

    <div class="box">
        <div class="link" id="myLink">جاري التحميل...</div>
        <button class="btn" onclick="copy()">نسخ الرابط 📋</button>
        <button class="btn" style="background:#24A1DE; color:white;" onclick="share()">مشاركة في تليجرام ✈️</button>
    </div>

    <button onclick="history.back()" style="background:none; border:none; color:#666; margin-top:20px;">← رجوع</button>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');
        
        // غير "YourBotName" بيوزرنيم بوتك الحقيقي
        const botLink = `https://t.me/MegaTask_Bot?start=${userId}`;
        document.getElementById('myLink').innerText = botLink;

        function copy() {
            navigator.clipboard.writeText(botLink);
            alert("تم النسخ!");
        }

        function share() {
            const url = `https://t.me/share/url?url=${encodeURIComponent(botLink)}&text=${encodeURIComponent("سجل في بوت MegaTask وجمع نقط وفلوس! 💰")}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
