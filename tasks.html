<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المهام المتاحة - MegaTask</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --orange: #ff7e33; --bg: #0b0b13; --card: #151521; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .task-card { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .task-info { text-align: right; }
        .task-info b { display: block; color: var(--orange); font-size: 16px; }
        .task-info span { color: #00ff88; font-size: 13px; }
        .go-btn { background: var(--orange); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .back-btn { background: none; border: 1px solid #444; color: #888; padding: 10px; width: 100%; border-radius: 10px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h2 style="color: var(--orange);">📋 المهام المتاحة</h2>
    <div id="tasks-container">جاري تحميل المهام...</div>

    <button class="back-btn" onclick="goBack()">← رجوع للرئيسية</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const S_URL = "https://smukfrwnguvmxvfwqwrv.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM";
        const client = supabase.createClient(S_URL, S_KEY);

        const params = new URLSearchParams(window.location.search);
        const tid = String(params.get('id') || (tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : ""));

        async function getTasks() {
            const container = document.getElementById('tasks-container');
            let { data: tasks, error } = await client.from('tasks').select('*');

            if (error) {
                container.innerHTML = "❌ خطأ في تحميل المهام.";
                return;
            }

            container.innerHTML = "";
            if(tasks.length === 0) container.innerHTML = "لا توجد مهام حالياً.";
            
            tasks.forEach(task => {
                container.innerHTML += `
                    <div class="task-card">
                        <div class="task-info">
                            <b>${task.title}</b>
                            <span>💰 +${task.reward} نقطة</span>
                        </div>
                        <button class="go-btn" onclick="doTask('${task.link}', ${task.reward})">تنفيذ</button>
                    </div>
                `;
            });
        }

        async function doTask(link, reward) {
            window.open(link, '_blank');
            
            tg.showConfirm("هل نفذت المهمة فعلاً؟", async (ok) => {
                if (ok && tid) {
                    try {
                        // 1. جلب بيانات اليوزر الحالي (بما فيها مين اللي دعاه)
                        let { data: user, error: userErr } = await client
                            .from('users')
                            .select('*')
                            .eq('telegram_id', tid)
                            .maybeSingle();

                        if (userErr) throw userErr;

                        // 2. تحديث رصيد اليوزر + زيادة عدد مهامه الكلي
                        let newPoints = (user ? user.points : 0) + reward;
                        let newTotalTasks = (user ? user.total_tasks : 0) + 1;
                        
                        // تحديث حالة اليوزر (إضافة النقط + جعله "مدعو صالح" لو مش مفعل)
                        await client.from('users').update({ 
                            points: newPoints, 
                            total_tasks: newTotalTasks,
                            is_active_ref: true // أول مهمة تخليه "صالح" فوراً
                        }).eq('telegram_id', tid);

                        // 3. 🎁 نظام العمولات (لو اليوزر جاي من طرف حد)
                        if (user && user.referred_by) {
                            const commission = Math.floor(reward * 0.10); // 10% عمولة
                            
                            // جلب رصيد الشخص "الداعي"
                            let { data: inviter } = await client
                                .from('users')
                                .select('points, total_ref_commission')
                                .eq('telegram_id', user.referred_by)
                                .maybeSingle();

                            if (inviter) {
                                // إضافة العمولة لرصيد الداعي + تحديث إجمالي عمولاته
                                await client.from('users').update({ 
                                    points: inviter.points + commission,
                                    total_ref_commission: (inviter.total_ref_commission || 0) + commission
                                }).eq('telegram_id', user.referred_by);
                            }
                        }

                        tg.showAlert(`✅ عاش يا بطل! انضاف لك ${reward} نقطة.`);
                        
                    } catch (err) {
                        console.error(err);
                        tg.showAlert("❌ حدث خطأ أثناء تحديث البيانات.");
                    }
                }
            });
        }

        function goBack() { window.location.href = `index.html?id=${tid}`; }
        getTasks();
    </script>
</body>
</html>
