<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المهام - MegaTask</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --orange: #ff7e33; --bg: #0b0b13; --card: #151521; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .task-card { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--orange); }
        .task-info { text-align: right; }
        .task-info b { display: block; color: var(--orange); font-size: 16px; }
        .task-info span { color: #00ff88; font-size: 13px; font-weight: bold; }
        .go-btn { background: var(--orange); color: white; border: none; padding: 10px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .go-btn:active { transform: scale(0.95); background: #e66d2a; }
        .back-btn { background: none; border: 1px solid #444; color: #888; padding: 12px; width: 100%; border-radius: 10px; margin-top: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="color: var(--orange); margin-bottom: 25px;">📋 قائمة المهام</h2>
    <div id="tasks-container">جاري تحميل المهام...</div>

    <button class="back-btn" onclick="goBack()">← العودة للرئيسية</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const S_URL = "https://smukfrwnguvmxvfwqwrv.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM";
        const client = supabase.createClient(S_URL, S_KEY);

        const params = new URLSearchParams(window.location.search);
        const tid = String(params.get('id') || tg.initDataUnsafe.user?.id || "").trim();

        async function fetchTasks() {
            const container = document.getElementById('tasks-container');
            try {
                let { data: tasks, error } = await client.from('tasks').select('*');
                if (error) throw error;

                container.innerHTML = "";
                if (!tasks || tasks.length === 0) {
                    container.innerHTML = "لا توجد مهام متاحة حالياً.";
                    return;
                }

                tasks.forEach(task => {
                    container.innerHTML += `
                        <div class="task-card">
                            <div class="task-info">
                                <b>${task.title}</b>
                                <span>+${task.reward} نقطة 💰</span>
                            </div>
                            <button class="go-btn" onclick="completeTask('${task.link}', ${task.reward})">تنفيذ</button>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = "❌ عطل في تحميل المهام.";
                console.error(err);
            }
        }

        async function completeTask(link, reward) {
    window.open(link, '_blank');
    
    tg.showConfirm("هل نفذت المهمة؟", async (ok) => {
        if (ok) {
            // 1. تحديث رصيد اليوزر الحالي (مباشرة)
            const { data: user } = await client.from('users').select('*').eq('telegram_id', String(tid)).single();
            
            if (user) {
                // تحديث اليوزر نفسه
                await client.from('users').update({
                    points: Number(user.points) + Number(reward),
                    total_tasks: Number(user.total_tasks || 0) + 1,
                    is_active_ref: true
                }).eq('telegram_id', String(tid));

                // 2. تحديث الداعي (العمولة)
                if (user.referred_by) {
                    const inviterId = String(user.referred_by);
                    const { data: inviter } = await client.from('users').select('points, total_ref_commission').eq('telegram_id', inviterId).single();
                    
                    if (inviter) {
                        await client.from('users').update({
                            points: Number(inviter.points) + Math.floor(reward * 0.10),
                            total_ref_commission: Number(inviter.total_ref_commission || 0) + Math.floor(reward * 0.10)
                        }).eq('telegram_id', inviterId);
                    }
                }
                tg.showAlert("✅ مبروك! تم إضافة النقاط.");
            }
        }
    });
}

        function goBack() { window.location.href = `index.html?id=${tid}`; }
        fetchTasks();
    </script>
</body>
</html>
