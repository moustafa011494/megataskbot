<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المهام - MegaTask</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0b13; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .task-card { background: #151521; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .go-btn { background: #ff7e33; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="color: #ff7e33;">📋 المهام المتاحة</h2>
    <div id="tasks-list">جاري التحميل...</div>

    <script>
        const tg = window.Telegram.WebApp;
        const S_URL = "https://smukfrwnguvmxvfwqwrv.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM";
        const client = supabase.createClient(S_URL, S_KEY);

        const params = new URLSearchParams(window.location.search);
        const tid = String(params.get('id') || tg.initDataUnsafe.user?.id || "");

        async function loadTasks() {
            let { data: tasks } = await client.from('tasks').select('*');
            const list = document.getElementById('tasks-list');
            list.innerHTML = "";
            tasks.forEach(t => {
                list.innerHTML += `
                    <div class="task-card">
                        <div style="text-align:right"><b>${t.title}</b><br><small style="color:#00ff88">+${t.reward} نقطة</small></div>
                        <button class="go-btn" onclick="completeTask('${t.link}', ${t.reward})">تنفيذ</button>
                    </div>`;
            });
        }

        async function completeTask(link, reward) {
            window.open(link, '_blank');
            tg.showConfirm("هل نفذت المهمة؟", async (ok) => {
                if (ok) {
                    // 1. جلب بيانات اليوزر الحالية
                    let { data: user } = await client.from('users').select('*').eq('telegram_id', tid).single();
                    
                    if (user) {
                        // 2. إضافة النقط لليوزر وتحديث حالته
                        const { error: upErr } = await client.from('users').update({
                            points: user.points + reward,
                            total_tasks: (user.total_tasks || 0) + 1,
                            is_active_ref: true
                        }).eq('telegram_id', tid);

                        if(upErr) return alert("خطأ في إضافة النقاط: " + upErr.message);

                        // 3. 🎁 إضافة العمولة للداعي (لو موجود)
                        if (user.referred_by) {
                            const comm = Math.floor(reward * 0.10);
                            let { data: inviter } = await client.from('users').select('points, total_ref_commission').eq('telegram_id', user.referred_by).maybeSingle();
                            if (inviter) {
                                await client.from('users').update({
                                    points: inviter.points + comm,
                                    total_ref_commission: (inviter.total_ref_commission || 0) + comm
                                }).eq('telegram_id', user.referred_by);
                            }
                        }
                        tg.showAlert("✅ مبروك! تم إضافة " + reward + " نقطة لرصيدك.");
                    }
                }
            });
        }
        loadTasks();
    </script>
</body>
</html>
