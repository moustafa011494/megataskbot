<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - MegaTask</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --main-green: #00d26a;
            --dark-bg: #0d0f12;
            --card-bg: #1a1d23;
            --text-gray: #9ca3af;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
            padding-bottom: 100px;
        }

        h2 { color: white; text-align: right; margin-bottom: 25px; font-size: 22px; }

        /* كروت المهام */
        .task-card {
            background: var(--card-bg);
            border: 1px solid #2d333d;
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .task-info { text-align: right; }
        .task-info b { display: block; font-size: 15px; color: white; margin-bottom: 5px; }
        .task-info span { color: var(--main-green); font-size: 13px; font-weight: bold; }

        .go-btn {
            background: var(--main-green);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* شريط التنقل السفلي (نفس الرئيسية) */
        .navbar {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            background: rgba(26, 29, 35, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #2d333d;
            z-index: 1000;
        }
        .nav-item {
            text-align: center;
            color: var(--text-gray);
            font-size: 11px;
            text-decoration: none;
        }
        .nav-item.active { color: var(--main-green); }
        .center-nav {
            background: var(--main-green);
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-top: -25px;
            box-shadow: 0 0 15px rgba(0, 210, 106, 0.4);
            color: black !important;
        }
    </style>
</head>
<body>

    <h2>📋 المهام المتاحة</h2>
    <div id="tasks-container">جاري تحميل العروض...</div>

    <nav class="navbar">
        <a href="#" onclick="goHome()" class="nav-item">🏠<br>الرئيسية</a>
        <a href="#" class="nav-item active">📋<br>اكسب</a>
        <a href="#" class="nav-item center-nav">🎮</a>
        <a href="#" onclick="goInvite()" class="nav-item">👥<br>أجل</a>
        <a href="#" class="nav-item">👤<br>أنا</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const S_URL = "https://smukfrwnguvmxvfwqwrv.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM";
        const client = supabase.createClient(S_URL, S_KEY);

        const params = new URLSearchParams(window.location.search);
        const tid = String(params.get('id') || tg.initDataUnsafe.user?.id || "").trim();

        async function fetchTasks() {
            let { data: tasks } = await client.from('tasks').select('*');
            const container = document.getElementById('tasks-container');
            container.innerHTML = "";
            tasks.forEach(t => {
                container.innerHTML += `
                    <div class="task-card">
                        <div class="task-info">
                            <b>${t.title}</b>
                            <span>+${t.reward} Mega 💰</span>
                        </div>
                        <button class="go-btn" onclick="completeTask('${t.link}', ${t.reward})">تنفيذ</button>
                    </div>`;
            });
        }

        async function completeTask(link, reward) {
            window.open(link, '_blank');
            tg.showConfirm("هل نفذت المهمة؟", async (ok) => {
                if (ok && tid) {
                    let { data: user } = await client.from('users').select('*').eq('telegram_id', tid).single();
                    if (user) {
                        // 1. تحديث اليوزر
                        await client.from('users').update({
                            points: Number(user.points) + Number(reward),
                            total_tasks: Number(user.total_tasks || 0) + 1,
                            is_active_ref: true
                        }).eq('telegram_id', tid);

                        // 2. تحديث الداعي (النسبة)
                        if (user.referred_by) {
                            const comm = Math.floor(reward * 0.10);
                            let { data: inviter } = await client.from('users').select('points, total_ref_commission').eq('telegram_id', user.referred_by).maybeSingle();
                            if (inviter) {
                                await client.from('users').update({
                                    points: Number(inviter.points) + comm,
                                    total_ref_commission: Number(inviter.total_ref_commission || 0) + comm
                                }).eq('telegram_id', user.referred_by);
                            }
                        }
                        tg.showAlert("✅ مبروك! انضفت النقاط لرصيدك.");
                    }
                }
            });
        }

        // دالة التنقل لبروفايل
function goProfile() {
    window.location.href = `profile.html?id=${tid}`;
}

// دالة التنقل للرئيسية
function goHome() {
    window.location.href = `index.html?id=${tid}`;
}

// دالة التنقل للمهام
function goTasks() {
    window.location.href = `tasks.html?id=${tid}`;
}

// دالة التنقل للدعوات
function goInvite() {
    window.location.href = `invite.html?id=${tid}`;
}

        fetchTasks();
    </script>
</body>
</html>
