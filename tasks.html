<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaTask - المهام</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon-purple: #bc13fe; --neon-blue: #00f2ff; --bg-dark: #0d0d0d; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; padding: 15px; }
        
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-btn { background: #222; color: white; border: 1px solid #444; padding: 8px 15px; border-radius: 10px; cursor: pointer; text-decoration: none; font-size: 14px; }
        
        .task-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 4px solid var(--neon-blue);
        }
        .task-info b { display: block; font-size: 16px; margin-bottom: 5px; }
        .task-info span { color: var(--neon-blue); font-weight: bold; }
        
        .go-btn {
            background: var(--neon-purple);
            color: white; border: none; padding: 10px 20px;
            border-radius: 10px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="goBack()">← رجوع</button>
        <h2>📋 المهام المتاحة</h2>
    </div>

    <div id="tasks-container">جاري تحميل المهام... ⏳</div>

        <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const S_URL = "https://smukfrwnguvmxvfwqwrv.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM";
        const client = supabase.createClient(S_URL, S_KEY);

        // جلب الـ ID من الرابط أو تليجرام وتحويله لنص
        const params = new URLSearchParams(window.location.search);
        let tid = String(params.get('id') || (tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : ""));

        async function getTasks() {
            const container = document.getElementById('tasks-container');
            let { data: tasks, error } = await client.from('tasks').select('*');

            if (error) {
                container.innerHTML = "❌ خطأ في تحميل المهام.";
                return;
            }

            container.innerHTML = "";
            tasks.forEach(task => {
                container.innerHTML += `
                    <div class="task-card">
                        <div class="task-info">
                            <b>${task.title}</b>
                            <span>💰 +${task.reward} نقطة</span>
                        </div>
                        <button class="go-btn" onclick="doTask('${task.link}', ${task.reward})">تنفيذ</button>
                    </div>
                `;
            });
        }

        async function doTask(link, reward) {
            window.open(link, '_blank');
            
            tg.showConfirm("هل نفذت المهمة؟", async (ok) => {
                if (ok && tid) {
                    try {
                        // 1. جلب رصيد اليوزر الحالي
                        let { data: userData, error: fetchErr } = await client
                            .from('users')
                            .select('points')
                            .eq('telegram_id', tid)
                            .maybeSingle();

                        if (fetchErr) throw fetchErr;

                        // لو اليوزر مش موجود (مثلاً أول مرة يدخل)، سجله بـ 0 نقطة
                        let currentPoints = userData ? userData.points : 0;
                        if (!userData) {
                            await client.from('users').insert([{ telegram_id: tid, points: 0, name: tg.initDataUnsafe.user?.first_name || "مستخدم" }]);
                        }

                        // 2. تحديث الرصيد (الجمع)
                        const { error: upErr } = await client
                            .from('users')
                            .update({ points: currentPoints + reward })
                            .eq('telegram_id', tid);

                        if (upErr) throw upErr;

                        tg.showAlert(`✅ مبروك! انضاف لك ${reward} نقطة.`);
                    } catch (err) {
                        console.error(err);
                        tg.showAlert("❌ حدث خطأ أثناء إضافة النقاط.");
                    }
                }
            });
        }

        function goBack() {
            window.location.href = `index.html?id=${tid}`;
        }

        getTasks();
    </script>
</body>
</html>
