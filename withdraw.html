<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحب الأرباح - MegaTask</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon-blue: #00f2ff; --bg: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #161616; padding: 25px; border-radius: 20px; border: 1px solid #333; max-width: 400px; margin: auto; }
        .rules { text-align: right; font-size: 13px; color: #aaa; background: #222; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        select, input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--neon-blue); color: white; border-radius: 10px; }
        .btn-withdraw { background: var(--neon-blue); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-withdraw:disabled { background: #444; color: #888; }
        .balance-box { font-size: 20px; margin-bottom: 20px; color: var(--neon-blue); font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>💸 سحب الأرباح</h2>
        
        <div class="balance-box">رصيدك: <span id="user-points">0</span> نقطة</div>

        <div class="rules">
            <b>⚠️ قواعد السحب:</b>
            <ul>
                <li>الحد الأدنى للسحب هو 5000 نقطة.</li>
                <li>يتم مراجعة الطلب خلال 24 ساعة.</li>
                <li>تأكد من صحة بيانات المحفظة، الخطأ مسؤوليتك.</li>
            </ul>
        </div>

        <label>اختر وسيلة السحب:</label>
        <select id="method">
            <option value="Vodafone Cash">فودافون كاش 🇪🇬</option>
            <option value="Binance Pay">باينانس باي (USDT) 💰</option>
        </select>

        <input type="text" id="wallet" placeholder="رقم الموبايل أو ID باينانس">
        <input type="number" id="amount" placeholder="كمية النقاط (مثال: 5000)">

        <button id="withdraw-btn" class="btn-withdraw" onclick="requestWithdraw()">إرسال طلب السحب 🚀</button>
        <p id="msg" style="margin-top:15px; font-size:14px;"></p>
    </div>

    <script>
        const S_URL = "https://smukfrwnguvmxvfwqwrv.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM";
        const client = supabase.createClient(S_URL, S_KEY);

        // جلب بيانات اليوزر من اللينك (مثال: ?id=123)
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        let currentPoints = 0;

        async function getUserData() {
            if(!userId) return document.body.innerHTML = "<h1>خطأ في الدخول من البوت!</h1>";
            
            let { data } = await client.from('users').select('points, name').eq('telegram_id', userId).single();
            if(data) {
                currentPoints = data.points;
                document.getElementById('user-points').innerText = currentPoints;
                window.userName = data.name;
            }
        }

        async function requestWithdraw() {
            const method = document.getElementById('method').value;
            const wallet = document.getElementById('wallet').value;
            const amount = parseInt(document.getElementById('amount').value);
            const btn = document.getElementById('withdraw-btn');

            // الشروط
            if(!wallet || !amount) return alert("اكمل البيانات يا بطل!");
            if(amount < 5000) return alert("الحد الأدنى للسحب هو 5000 نقطة!");
            if(amount > currentPoints) return alert("رصيدك غير كافي!");

            btn.disabled = true;
            document.getElementById('msg').innerText = "جاري معالجة الطلب... ⏳";

            try {
                // 1. خصم النقط من اليوزر أولاً
                const { error: updateErr } = await client.from('users')
                    .update({ points: currentPoints - amount })
                    .eq('telegram_id', userId);

                if(updateErr) throw updateErr;

                // 2. تسجيل الطلب في جدول withdrawals اللي عملناه للأدمن
                const { error: insertErr } = await client.from('withdrawals').insert([{
                    user_id: userId,
                    user_name: window.userName || "مستخدم",
                    amount: amount,
                    wallet_address: `${method}: ${wallet}`,
                    status: 'pending'
                }]);

                if(insertErr) throw insertErr;

                alert("تم إرسال طلبك بنجاح! راقب اللوحة.");
                location.reload();

            } catch (err) {
                alert("حدث خطأ: " + err.message);
                btn.disabled = false;
            }
        }

        getUserData();
    </script>
</body>
</html>
