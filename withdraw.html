<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - MegaTask</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-green: #00d26a; --dark-bg: #0d0f12; --card-bg: #1a1d23; --text-gray: #9ca3af; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 100px; }
        
        .balance-card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid #2d333d; text-align: center; margin-bottom: 25px; }
        .balance-card span { color: var(--text-gray); font-size: 14px; }
        .balance-card h2 { color: var(--main-green); font-size: 32px; margin: 10px 0; }

        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-gray); }
        
        select, input {
            width: 100%; background: #000; border: 1px solid #2d333d; padding: 15px;
            border-radius: 12px; color: white; font-size: 16px; box-sizing: border-box; outline: none;
        }
        select:focus, input:focus { border-color: var(--main-green); }

        .withdraw-btn {
            background: var(--main-green); color: black; border: none; width: 100%;
            padding: 18px; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px;
        }
        .withdraw-btn:disabled { background: #1e3a2b; color: #555; cursor: not-allowed; }

        /* شريط التنقل السفلي */
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(26, 29, 35, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #2d333d; z-index: 1000; }
        .nav-item { text-align: center; color: var(--text-gray); font-size: 11px; text-decoration: none; cursor: pointer; }
        .center-nav { background: var(--main-green); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -25px; color: black !important; }
    </style>
</head>
<body>

    <h2 style="text-align: right;">💰 سحب الأرباح</h2>

    <div class="balance-card">
        <span>رصيدك الحالي</span>
        <h2 id="current-points">0</h2>
        <small style="color: var(--text-gray);">الحد الأدنى للسحب: 5000 نقطة</small>
    </div>

    <div class="input-group">
        <label>وسيلة السحب</label>
        <select id="method">
            <option value="Vodafone Cash">Vodafone Cash 🇪🇬</option>
            <option value="Binance Pay">Binance Pay (USDT) 🌐</option>
            <option value="Gift Cards">Google Play / Free Fire 🎁</option>
        </select>
    </div>

    <div class="input-group">
        <label>المبلغ المراد سحبه (نقطة)</label>
        <input type="number" id="amount" placeholder="مثال: 5000">
    </div>

    <div class="input-group">
        <label>بيانات المحفظة / الرقم</label>
        <input type="text" id="wallet" placeholder="ادخل الرقم أو المعرف هنا">
    </div>

    <button class="withdraw-btn" id="withdrawBtn" onclick="requestWithdraw()">إرسال طلب السحب ↗</button>

    <nav class="navbar">
        <div onclick="goHome()" class="nav-item">🏠<br>الرئيسية</div>
        <div onclick="goTasks()" class="nav-item">📋<br>اكسب</div>
        <div class="nav-item center-nav">🎮</div>
        <div onclick="goInvite()" class="nav-item">👥<br>أجل</div>
        <div onclick="goProfile()" class="nav-item">👤<br>أنا</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const S_URL = "https://smukfrwnguvmxvfwqwrv.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM";
        const client = supabase.createClient(S_URL, S_KEY);

        const params = new URLSearchParams(window.location.search);
        const tid = String(params.get('id') || tg.initDataUnsafe.user?.id || "").trim();
        let userPoints = 0;

        async function init() {
            let { data: user } = await client.from('users').select('points').eq('telegram_id', tid).single();
            if (user) {
                userPoints = user.points;
                document.getElementById('current-points').innerText = userPoints.toLocaleString();
            }
        }

        async function requestWithdraw() {
                async function requestWithdraw() {
            const amountInput = document.getElementById('amount').value;
            const method = document.getElementById('method').value;
            const wallet = document.getElementById('wallet').value;
            const amount = parseInt(amountInput);

            if (!amount || amount < 5000) {
                tg.showAlert("⚠️ الحد الأدنى للسحب هو 5000 نقطة.");
                return;
            }
            if (amount > userPoints) {
                tg.showAlert("❌ رصيدك غير كافٍ.");
                return;
            }
            if (!wallet) {
                tg.showAlert("⚠️ من فضلك ادخل بيانات المحفظة.");
                return;
            }

            document.getElementById('withdrawBtn').disabled = true;

            // 1. تسجيل الطلب في جدول withdrawals
            const { error: reqErr } = await client.from('withdrawals').insert([{
                telegram_id: String(tid),
                amount: Number(amount),
                method: String(method),
                wallet_info: String(wallet),
                status: 'Pending'
            }]);

            if (!reqErr) {
                // 2. خصم النقاط من رصيد اليوزر في جدول users
                const { error: updateErr } = await client
                    .from('users')
                    .update({ points: Number(userPoints - amount) })
                    .eq('telegram_id', String(tid));

                if (!updateErr) {
                    tg.showAlert("✅ تم إرسال طلبك بنجاح! سيتم المراجعة والدفع قريباً.");
                    window.location.reload();
                } else {
                    tg.showAlert("❌ تم تسجيل الطلب ولكن فشل خصم النقاط: " + updateErr.message);
                }
            } else {
                console.error("Withdraw Error:", reqErr);
                tg.showAlert("❌ خطأ في قاعدة البيانات: " + reqErr.message);
                document.getElementById('withdrawBtn').disabled = false;
            }
        }


        function goHome() { window.location.href = `index.html?id=${tid}`; }
        function goTasks() { window.location.href = `tasks.html?id=${tid}`; }
        function goInvite() { window.location.href = `invite.html?id=${tid}`; }
        function goProfile() { window.location.href = `profile.html?id=${tid}`; }

        init();
    </script>
</body>
</html>
