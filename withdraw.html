<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحب الأرباح - MegaTask</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon-blue: #00f2ff; --bg: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #161616; padding: 25px; border-radius: 20px; border: 1px solid #333; max-width: 400px; margin: auto; }
        .balance-box { font-size: 24px; margin-bottom: 20px; color: var(--neon-blue); font-weight: bold; }
        .debug-info { font-size: 10px; color: #444; margin-bottom: 10px; } /* سطر كشف الأخطاء */
        select, input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--neon-blue); color: white; border-radius: 10px; }
        .btn-withdraw { background: var(--neon-blue); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .back-link { display: block; margin-top: 20px; color: #777; text-decoration: none; }
    </style>
</head>
<body>

    <div class="debug-info" id="debug">جاري فحص المعرّف...</div>

    <div class="card">
        <h2>💸 سحب الأرباح</h2>
        <div class="balance-box">رصيدك: <span id="user-points">...</span></div>

        <select id="method">
            <option value="Vodafone Cash">فودافون كاش 🇪🇬</option>
            <option value="Binance Pay">باينانس باي 💰</option>
        </select>

        <input type="text" id="wallet" placeholder="رقم المحفظة">
        <input type="number" id="amount" placeholder="كمية النقاط">

        <button id="withdraw-btn" class="btn-withdraw" onclick="requestWithdraw()">إرسال الطلب</button>
        <a href="#" class="back-link" onclick="goBack()">← العودة</a>
    </div>

            <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const S_URL = "https://smukfrwnguvmxvfwqwrv.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM";
        const client = supabase.createClient(S_URL, S_KEY);

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const tid = params.get('id') || (tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "");
            
            if (!tid) {
                document.getElementById('user-points').innerText = "⚠️ افتح من البوت";
                return;
            }

            document.getElementById('debug').innerText = "🆔 معرفك: " + tid;

            // جلب البيانات
            const { data, error } = await client
                .from('users')
                .select('points, name')
                .eq('telegram_id', tid) 
                .maybeSingle();

            if (error) {
                console.error("Policy Error:", error.message);
                document.getElementById('user-points').innerText = "❌ تأكد من إعدادات الـ Policy";
            } else if (data) {
                window.currentPoints = data.points;
                window.userId = tid;
                window.userName = data.name;
                document.getElementById('user-points').innerText = data.points.toLocaleString() + " نقطة";
            } else {
                document.getElementById('user-points').innerText = "0 (حساب جديد)";
            }
        }

        async function requestWithdraw() {
            const wallet = document.getElementById('wallet').value;
            const amount = parseInt(document.getElementById('amount').value);
            const method = document.getElementById('method').value;

            if(!wallet || !amount) return alert("اكمل البيانات!");
            if(amount < 5000) return alert("الحد الأدنى 5000!");
            if(amount > window.currentPoints) return alert("رصيدك لا يكفي!");

            try {
                // إرسال الطلب لجدول withdrawals
                const { error } = await client.from('withdrawals').insert([{
                    user_id: window.userId,
                    user_name: window.userName || "مستخدم",
                    amount: amount,
                    wallet_address: `${method}: ${wallet}`,
                    status: 'pending'
                }]);

                if (error) throw error;

                // تحديث النقط
                await client.from('users').update({ points: window.currentPoints - amount }).eq('telegram_id', window.userId);
                
                alert("✅ طلبك قيد المراجعة!");
                location.reload();
            } catch (err) {
                alert("❌ حدث خطأ: " + err.message);
            }
        }

        function goBack() {
            const params = new URLSearchParams(window.location.search);
            window.location.href = `index.html?id=${params.get('id')}`;
        }

        init();
    </script>
</body>
</html>
