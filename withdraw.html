<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - MegaTask</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-green: #00d26a; --dark-bg: #0d0f12; --card-bg: #1a1d23; --text-gray: #9ca3af; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 100px; }
        .balance-card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid #2d333d; text-align: center; margin-bottom: 25px; }
        .balance-card h2 { color: var(--main-green); font-size: 32px; margin: 10px 0; }
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-gray); }
        select, input { width: 100%; background: #000; border: 1px solid #2d333d; padding: 15px; border-radius: 12px; color: white; box-sizing: border-box; outline: none; }
        .withdraw-btn { background: var(--main-green); color: black; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .withdraw-btn:disabled { background: #333; color: #666; }
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(26, 29, 35, 0.95); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #2d333d; }
        .nav-item { text-align: center; color: var(--text-gray); font-size: 11px; text-decoration: none; cursor: pointer; }
        .center-nav { background: var(--main-green); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -20px; color: black !important; }
    </style>
</head>
<body>

    <h2 style="text-align: right;">💰 سحب الأرباح</h2>

    <div class="balance-card">
        <span>رصيدك الحالي</span>
        <h2 id="current-points">Loading...</h2>
        <small style="color: var(--text-gray);">الحد الأدنى: 5,000 نقطة</small>
    </div>

    <div class="input-group">
        <label>وسيلة السحب</label>
        <select id="method">
            <option value="Vodafone Cash">Vodafone Cash 🇪🇬</option>
            <option value="Binance Pay">Binance Pay (USDT) 🌐</option>
            <option value="Gift Cards">Google Play / Free Fire 🎁</option>
        </select>
    </div>

    <div class="input-group">
        <label>المبلغ (نقطة)</label>
        <input type="number" id="amount" placeholder="5000">
    </div>

    <div class="input-group">
        <label>الرقم / المعرف</label>
        <input type="text" id="wallet" placeholder="مثلاً: 010xxxxxxxx">
    </div>

    <button class="withdraw-btn" id="withdrawBtn" onclick="processWithdraw()">إرسال الطلب ↗</button>

    <nav class="navbar">
        <div onclick="goHome()" class="nav-item">🏠<br>الرئيسية</div>
        <div onclick="goTasks()" class="nav-item">📋<br>اكسب</div>
        <div class="nav-item center-nav">🎮</div>
        <div onclick="goInvite()" class="nav-item">👥<br>أجل</div>
        <div onclick="goProfile()" class="nav-item">👤<br>أنا</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const S_URL = "https://smukfrwnguvmxvfwqwrv.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtdWtmcnduZ3V2bXh2Zndxd3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MDg1NjgsImV4cCI6MjA4NTA4NDU2OH0.NUr7X5V7K-jarVLNm7Ft0dHo6QkIhhGYrkteRRb9wCM";
        const client = supabase.createClient(S_URL, S_KEY);

        const params = new URLSearchParams(window.location.search);
        const tid = String(params.get('id') || tg.initDataUnsafe.user?.id || "").trim();
        let userBalance = 0;

        async function init() {
            if(!tid) { document.getElementById('current-points').innerText = "Error ID"; return; }
            
            const { data, error } = await client.from('users').select('points').eq('telegram_id', tid).maybeSingle();
            if (data) {
                userBalance = data.points;
                document.getElementById('current-points').innerText = userBalance.toLocaleString();
            } else {
                document.getElementById('current-points').innerText = "0";
            }
        }

        async function processWithdraw() {
            const amount = parseInt(document.getElementById('amount').value);
            const method = document.getElementById('method').value;
            const wallet = document.getElementById('wallet').value;
            const btn = document.getElementById('withdrawBtn');

            if (isNaN(amount) || amount < 5000) return tg.showAlert("❌ الحد الأدنى 5000 نقطة");
            if (amount > userBalance) return tg.showAlert("❌ رصيدك لا يكفي");
            if (!wallet) return tg.showAlert("⚠️ ادخل بيانات المحفظة");

            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";

            // تسجيل السحب
            const { error: err1 } = await client.from('withdrawals').insert([{
                telegram_id: tid, amount: amount, method: method, wallet_info: wallet, status: 'Pending'
            }]);

            if (!err1) {
                // خصم النقط
                await client.from('users').update({ points: userBalance - amount }).eq('telegram_id', tid);
                tg.showAlert("✅ طلبك قيد المراجعة!");
                window.location.href = `index.html?id=${tid}`;
            } else {
                tg.showAlert("❌ خطأ: " + err1.message);
                btn.disabled = false;
                btn.innerText = "إرسال الطلب ↗";
            }
        }

        function goHome() { window.location.href = `index.html?id=${tid}`; }
        function goTasks() { window.location.href = `tasks.html?id=${tid}`; }
        function goInvite() { window.location.href = `invite.html?id=${tid}`; }
        function goProfile() { window.location.href = `profile.html?id=${tid}`; }

        init();
    </script>
</body>
</html>
